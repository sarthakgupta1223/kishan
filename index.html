<body style="
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
">

<div style="
width:95%;
max-width:500px;
padding:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
">

<h1 style="
text-align:center;
color:white;
margin-bottom:20px;
font-size:clamp(24px,5vw,36px);
letter-spacing:2px;
">
SARTHAK'S CALCULATOR
</h1>

<input
type="text"
id="display"
readonly
style="
width:100%;
height:70px;
font-size:32px;
text-align:right;
padding-right:15px;
box-sizing:border-box;
border:none;
border-radius:15px;
background:white;
margin-bottom:15px;
"
>

<div style="
background:white;
border-radius:15px;
padding:15px;
margin-bottom:20px;
text-align:right;
">

<div style="
font-size:14px;
color:gray;
">
RESULT
</div>

<div id="result" style="
font-size:36px;
font-weight:bold;
color:#0f172a;
">
0
</div>

</div>

<div style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
">

<button onclick="clearDisplay()" style="height:65px;font-size:22px;border:none;border-radius:15px;background:#ef4444;color:white;">C</button>

<button onclick="append('(')" style="height:65px;font-size:22px;border:none;border-radius:15px;">(</button>

<button onclick="append(')')" style="height:65px;font-size:22px;border:none;border-radius:15px;">)</button>

<button onclick="append('/')" style="height:65px;font-size:22px;border:none;border-radius:15px;background:#3b82f6;color:white;">÷</button>

<button onclick="append('7')" style="height:65px;font-size:22px;border:none;border-radius:15px;">7</button>

<button onclick="append('8')" style="height:65px;font-size:22px;border:none;border-radius:15px;">8</button>

<button onclick="append('9')" style="height:65px;font-size:22px;border:none;border-radius:15px;">9</button>

<button onclick="append('*')" style="height:65px;font-size:22px;border:none;border-radius:15px;background:#3b82f6;color:white;">×</button>

<button onclick="append('4')" style="height:65px;font-size:22px;border:none;border-radius:15px;">4</button>

<button onclick="append('5')" style="height:65px;font-size:22px;border:none;border-radius:15px;">5</button>

<button onclick="append('6')" style="height:65px;font-size:22px;border:none;border-radius:15px;">6</button>

<button onclick="append('-')" style="height:65px;font-size:22px;border:none;border-radius:15px;background:#3b82f6;color:white;">−</button>

<button onclick="append('1')" style="height:65px;font-size:22px;border:none;border-radius:15px;">1</button>

<button onclick="append('2')" style="height:65px;font-size:22px;border:none;border-radius:15px;">2</button>

<button onclick="append('3')" style="height:65px;font-size:22px;border:none;border-radius:15px;">3</button>

<button onclick="append('+')" style="height:65px;font-size:22px;border:none;border-radius:15px;background:#3b82f6;color:white;">+</button>

<button onclick="append('%')" style="height:65px;font-size:22px;border:none;border-radius:15px;">%</button>

<button onclick="append('0')" style="height:65px;font-size:22px;border:none;border-radius:15px;">0</button>

<button onclick="append('.')" style="height:65px;font-size:22px;border:none;border-radius:15px;">.</button>

<button onclick="calculate()" style="
height:65px;
font-size:22px;
border:none;
border-radius:15px;
background:#10b981;
color:white;
font-weight:bold;
">
=
</button>

</div>

</div>

<script>
function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
document.getElementById("result").innerHTML="0";
}

function calculate(){
try{
let result=eval(document.getElementById("display").value);
document.getElementById("result").innerHTML=result;
}
catch{
document.getElementById("result").innerHTML="Error";
}
}
</script>

</body>
